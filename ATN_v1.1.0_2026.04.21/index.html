function tagChip(t){return '<span class="tag-chip chip-'+t+'">'+t+'</span>';}
function showToast(msg){var t=gid("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2000);}
function renderList(){var f=getFiltered(),nl=gid("note-list");nl.innerHTML="";f.forEach(function(n){var el=document.createElement("div");el.className="note-item"+(n.id===activeId?" active":"")+(n.pinned?" pinned-note":"");el.innerHTML='<div class="note-item-title">'+(n.pinned?'<span class="pin-icon">📌</span>':"")+escHtml(n.title||"제목 없음")+'</div><div class="note-item-preview">'+escHtml((n.body||"").replace(/\n/g," ").slice(0,60))+'</div><div class="note-item-meta">'+tagChip(n.tag)+'<span class="note-date">'+fmtDate(n.updatedAt)+'</span></div>';el.addEventListener("click",function(){selectNote(n.id);});nl.appendChild(el);});gid("note-count").textContent="메모 "+f.length+"개";}
function selectNote(id){activeId=id;var n=notes.filter(function(x){return x.id===id;})[0];if(!n)return;gid("empty-state").style.display="none";gid("editor-wrap").style.display="flex";gid("tag-select").value=n.tag;gid("title-input").value=n.title;gid("body-input").value=n.body;updatePinBtn(n.pinned);updateFooter(n);renderList();}
function updatePinBtn(p){gid("btn-pin").textContent=p?"📌 고정 해제":"📌 고정";gid("btn-pin").classList.toggle("active",p);}
function updateFooter(n){gid("footer-date").textContent="마지막 수정: "+fmtDate(n.updatedAt);gid("footer-chars").textContent=(n.body||"").length+"자";}
function scheduleAutosave(){clearTimeout(autosaveTimer);autosaveTimer=setTimeout(function(){saveActive(true);var ai=gid("autosave-ind");ai.classList.add("show");setTimeout(function(){ai.classList.remove("show");},1800);},1200);}
function copyContent(){var n=notes.filter(function(x){return x.id===activeId;})[0];if(!n)return;navigator.clipboard.writeText((n.title?n.title+" ":"")+n.body).then(function(){showToast("복사되었습니다");}).catch(function(){showToast("복사 실패");});}
gid("btn-new").addEventListener("click",newNote);gid("search").addEventListener("input",function(e){searchQ=e.target.value.trim();renderList();});
document.querySelectorAll(".tag-btn").forEach(function(b){b.addEventListener("click",function(){filterTag=b.dataset.tag;document.querySelectorAll(".tag-btn").forEach(function(x){x.classList.remove("active");});b.classList.add("active");renderList();});});
gid("tag-select").addEventListener("change",scheduleAutosave);gid("title-input").addEventListener("input",scheduleAutosave);
gid("body-input").addEventListener("input",function(){var n=notes.filter(function(x){return x.id===activeId;})[0];if(n)gid("footer-chars").textContent=gid("body-input").value.length+"자";scheduleAutosave();});
gid("btn-pin").addEventListener("click",togglePin);gid("btn-save").addEventListener("click",function(){saveActive(false);});gid("btn-delete").addEventListener("click",deleteActive);gid("btn-copy").addEventListener("click",copyContent);
document.addEventListener("keydown",function(e){if((e.ctrlKey||e.metaKey)&&e.key==="n"){e.preventDefault();newNote();}if((e.ctrlKey||e.metaKey)&&e.key==="s"){e.preventDefault();saveActive(false);}});
initAuth();
</script></body></html>
